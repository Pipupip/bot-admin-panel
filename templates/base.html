<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-indigo-700 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/dashboard" class="text-xl font-bold">⚙️ Admin Panel</a>
            <div class="space-x-4">
                <a href="/dashboard" class="hover:underline">Дашборд</a>
                <a href="/users" class="hover:underline">Пользователи</a>
                <a href="/mailing" class="hover:underline">Рассылка</a>
                <a href="/logout" class="hover:underline text-red-300">Выйти</a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
