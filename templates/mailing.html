{% extends "base.html" %}
{% block title %}Рассылка{% endblock %}
{% block content %}
<h1 class="text-3xl font-bold mb-6">📨 Рассылка</h1>
{% if result %}
<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">{{ result }}</div>
{% endif %}
<div class="bg-white p-6 rounded-lg shadow-md max-w-2xl">
    <form method="post" action="/mailing/send">
        <input type="hidden" name="csrf_token" value="{{ request.session.get('csrf_token', '') }}">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Текст сообщения</label>
            <textarea name="message" rows="8" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Введите текст для рассылки... Поддерживается HTML (например, &lt;b&gt;жирный&lt;/b&gt;)."></textarea>
        </div>
        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">🚀 Отправить всем</button>
    </form>
</div>
{% endblock %}
