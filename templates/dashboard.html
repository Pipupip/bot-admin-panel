{% extends "base.html" %}
{% block title %}Дашборд{% endblock %}
{% block content %}
<h1 class="text-3xl font-bold mb-6">📊 Дашборд</h1>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-lg text-gray-500">Всего пользователей</h2>
        <p class="text-4xl font-bold text-indigo-600">{{ total_users }}</p>
    </div>
    <div class="bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-lg text-gray-500">Заказов за сегодня</h2>
        <p class="text-4xl font-bold text-green-600">{{ today_orders }}</p>
    </div>
</div>
{% endblock %}
