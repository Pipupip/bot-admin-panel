{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-6 text-center">🔐 Вход в панель</h1>
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ request.session.get('csrf_token', '') }}">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Логин</label>
            <input type="text" name="username" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Пароль</label>
            <input type="password" name="password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">Войти</button>
    </form>
</div>
{% endblock %}
